<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1a0f2e,#3b1e5a);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  backdrop-filter:blur(10px);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.profile-pic{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #b57aff;
  margin-bottom:15px;
  transition:0.3s;
}
.profile-pic:hover{
  transform:scale(1.05);
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:#2a1742;
  color:#fff;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#b57aff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  background:#9a5cff;
  transform:scale(1.05);
}
</style>
</head>
<body>
<div class="container">
  <img id="preview" class="profile-pic" src="https://i.imgur.com/2DhmtJ4.png">
  <input type="file" id="imageInput" accept="image/*">
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="username" placeholder="Username">
  <button id="saveBtn">Save</button>
</div>
<script>
function hasAccount(){
  return localStorage.getItem("account") === "true";
}
if(!hasAccount()){
  window.location.href = "index.html";
}
function saveProfile(){
  let name = document.getElementById("name").value;
  let username = document.getElementById("username").value;
  let img = document.getElementById("preview").src;
  localStorage.setItem("name",name);
  localStorage.setItem("username",username);
  localStorage.setItem("profilePic",img);
  alert("Saved successfully ✅");
}
document.getElementById("imageInput").addEventListener("change",function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(){
      document.getElementById("preview").src = reader.result;
    }
    reader.readAsDataURL(file);
  }
});
window.onload = function(){
  if(localStorage.getItem("profilePic")){
    document.getElementById("preview").src = localStorage.getItem("profilePic");
  }
  if(localStorage.getItem("name")){
    document.getElementById("name").value = localStorage.getItem("name");
  }
  if(localStorage.getItem("username")){
    document.getElementById("username").value = localStorage.getItem("username");
  }
};
document.getElementById("saveBtn").addEventListener("click", saveProfile);
</script>
</body>
</html>

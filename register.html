<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Book's Club</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b0c27;display:flex;justify-content:center;align-items:center;height:100vh;color:white;}
.box{background:#1e1f3f;padding:30px;border-radius:12px;width:300px;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:8px;box-sizing: border-box;}
button{width:100%;padding:10px;background:#a855f7;border:none;color:white;border-radius:8px;cursor:pointer;}
button:hover{background:#c084fc;}
a{color:#3b82f6;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<div class="box">
  <h2>Register</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="signUpBtn">Sign Up</button>
  <br><br>
  <a href="login.html">Already have an account? Login</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// استبدل الـ App ID والـ Sender ID بالقيم الحقيقية من إعدادات مشروعك في Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCSKcXAntIIrm-BEgfCi2dykBby2SMuY48",
  authDomain: "book-club-13.firebaseapp.com",
  projectId: "book-club-13",
  storageBucket: "book-club-13.appspot.com",
  messagingSenderId: "ضع_الرقم_هنا", 
  appId: "ضع_الـ_ID_هنا"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById('email');
const passInput = document.getElementById('password');
const btn = document.getElementById('signUpBtn');

btn.addEventListener("click", () => {
  const email = emailInput.value;
  const password = passInput.value;

  if(!email || !password) {
      alert("Please fill in all fields");
      return;
  }

  createUserWithEmailAndPassword(auth, email, password)
  .then(() => {
      window.location.href = "index.html";
  })
  .catch((err) => {
      alert(err.message);
      console.error(err);
  });
});
</script>

</body>
</html>

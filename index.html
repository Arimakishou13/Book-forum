<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book's Club</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0b0f; color: #f5f5f5; overflow-x: hidden; }
.hero { text-align: center; margin: 120px 20px 60px; }
.hero h1 { font-size: 38px; }
.hero span { color: #a78bfa; }
.hero p { color: #aaa; }
.section { width: 90%; max-width: 500px; margin: 100px auto; opacity: 0; transform: translateX(-60px); transition: all 0.7s ease; }
.section.right { transform: translateX(60px); }
.section.show { opacity: 1; transform: translateX(0); }
.section h2 { color: #c4b5fd; margin-bottom: 10px; }
.section p { color: #aaa; }
.card { width: 100%; background: rgba(30, 20, 50, 0.6); padding: 25px; border-radius: 18px; backdrop-filter: blur(12px); box-shadow: 0 0 40px rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.2); }
input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #1a1325; color: #fff; transition: 0.3s; }
input:focus { outline: none; background: #221933; box-shadow: 0 0 10px rgba(167,139,250,0.4); }
button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(167,139,250,0.5); }
.footer { margin: 120px 0 30px; text-align: center; color: #777; font-size: 14px; }
</style>
</head>
<body>

<div class="hero">
  <h1>Welcome to <span>Book's Club</span></h1>
  <p>Your personal reading world</p>
</div>

<div class="section">
  <h2>Track your books easily</h2>
  <p>Organize everything in one place.</p>
</div>

<div class="section right">
  <h2>Upload your PDFs</h2>
  <p>Keep all your readings safe.</p>
</div>

<div class="section">
  <h2>Follow your progress</h2>
  <p>See how much you've read.</p>
</div>

<div class="section right">
  <div class="card">
    <h2>Login</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>
</div>

<div class="footer">
  powered by •ＵᏒ-１３•𓂀
</div>

<script>
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    const trigger = window.innerHeight - 100;
    if (top < trigger) sec.classList.add('show');
  });
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "PUT YOUR API KEY",
  authDomain: "PUT YOUR DOMAIN",
  projectId: "PUT YOUR ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.querySelector('input[type="email"]');
const passInput = document.querySelector('input[type="password"]');
const btn = document.querySelector("button");

btn.addEventListener("click", () => {
  const email = emailInput.value;
  const password = passInput.value;
  signInWithEmailAndPassword(auth, email, password)
    .then(() => { alert("Logged in 🔥"); })
    .catch(() => {
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("Account created ✅"))
        .catch(err => alert(err.message));
    });
});
</script>

</body>
  </html>

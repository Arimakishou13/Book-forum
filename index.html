<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Book's Club</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0b0f; color: #f5f5f5; overflow-x: hidden; }
.hero { text-align: center; margin: 120px 20px 60px; }
.hero h1 { font-size: 38px; }
.hero span { color: #a78bfa; }
.hero p { color: #aaa; }
.section { width: 90%; max-width: 500px; margin: 40px auto; opacity: 1; }
.card { width: 100%; background: rgba(30, 20, 50, 0.6); padding: 25px; border-radius: 18px; backdrop-filter: blur(12px); box-shadow: 0 0 40px rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.2); text-align: center; }
.logout-btn { background: #ff4d4d; color: #fff; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
.logout-btn:hover { background: #cc0000; transform: translateY(-2px); }
.footer { margin: 60px 0 30px; text-align: center; color: #777; font-size: 14px; }
</style>
</head>
<body>

<div id="dashboard">
  <div class="hero">
    <h1>Welcome, <span id="user-display">Reader</span>!</h1>
    <p>This is your private library space.</p>
  </div>

  <div class="section">
    <div class="card">
      <h2>Your Dashboard</h2>
      <p id="user-email" style="color: #a78bfa; margin-bottom: 20px;"></p>
      <div style="border: 2px dashed rgba(167,139,250,0.3); padding: 40px; border-radius: 15px; margin-bottom: 20px;">
        <p>PDF Upload Section Coming Soon...</p>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>
</div>

<div class="footer">powered by •ＵᏒ-１３•𓂀</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSKcXAntIIrm-BEgfCi2dykBby2SMuY48",
  authDomain: "book-club-13.firebaseapp.com",
  projectId: "book-club-13",
  storageBucket: "book-club-13.firebasestorage.app",
  messagingSenderId: "321914571323",
  appId: "1:321914571323:web:edfc6bc0ac802e6dd06a1e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    if (user.emailVerified || user.providerData[0].providerId === 'google.com') {
      document.getElementById('user-display').innerText = user.displayName || user.email.split('@')[0];
      document.getElementById('user-email').innerText = user.email;
    } else {
      window.location.href = 'login.html';
    }
  } else {
    window.location.href = 'login.html';
  }
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = 'login.html';
  });
});
</script>
</body>
</html>

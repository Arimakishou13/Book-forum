<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book's Club</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0b0f; color: #f5f5f5; overflow-x: hidden; }
.hero { text-align: center; margin: 120px 20px 60px; }
.hero h1 { font-size: 38px; }
.hero span { color: #a78bfa; }
.hero p { color: #aaa; }
.section { width: 90%; max-width: 500px; margin: 100px auto; opacity: 0; transform: translateX(-60px); transition: all 0.7s ease; }
.section.right { transform: translateX(60px); }
.section.show { opacity: 1; transform: translateX(0); }
.section h2 { color: #c4b5fd; margin-bottom: 10px; }
.section p { color: #aaa; }
.card { width: 100%; background: rgba(30, 20, 50, 0.6); padding: 25px; border-radius: 18px; backdrop-filter: blur(12px); box-shadow: 0 0 40px rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.2); }
input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #1a1325; color: #fff; transition: 0.3s; }
input:focus { outline: none; background: #221933; box-shadow: 0 0 10px rgba(167,139,250,0.4); }
button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(167,139,250,0.5); }
.footer { margin: 120px 0 30px; text-align: center; color: #777; font-size: 14px; }
#dashboard { display: none; text-align: center; padding: 50px 20px; }
.logout-btn { background: #ff4d4d; margin-top: 20px; width: auto; padding: 10px 30px; }
.swal2-popup { background: #1a1325 !important; color: #fff !important; border-radius: 18px !important; border: 1px solid rgba(167,139,250,0.2) !important; }
.swal2-title, .swal2-html-container { color: #fff !important; }
.swal2-confirm { background: linear-gradient(135deg, #a78bfa, #7c3aed) !important; border-radius: 10px !important; }
</style>
</head>
<body>

<div id="auth-ui">
  <div class="hero">
    <h1>Welcome to <span>Book's Club</span></h1>
    <p>Your personal reading world</p>
  </div>
  <div class="section show"><div class="card"><h2>Login / Sign Up</h2><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button id="loginBtn">Continue</button></div></div>
</div>

<div id="dashboard">
  <div class="hero"><h1>Welcome, <span id="user-display">Reader</span>!</h1><p>Your private space.</p></div>
  <div class="section show"><div class="card"><h2>Your Dashboard</h2><p>Library coming soon...</p><button class="logout-btn" id="logoutBtn">Logout</button></div></div>
</div>

<div class="footer">powered by •ＵᏒ-１３•𓂀</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSKcXAntIIrm-BEgfCi2dykBby2SMuY48",
  authDomain: "book-club-13.firebaseapp.com",
  projectId: "book-club-13",
  storageBucket: "book-club-13.firebasestorage.app",
  messagingSenderId: "321914571323",
  appId: "1:321914571323:web:edfc6bc0ac802e6dd06a1e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    if (user.emailVerified) {
      document.getElementById('auth-ui').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('user-display').innerText = user.email.split('@')[0];
    } else {
      Swal.fire({ icon: 'warning', title: 'Verify Your Email', text: 'Please check your inbox and verify your email before logging in.' });
      signOut(auth);
    }
  } else {
    document.getElementById('auth-ui').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }
});

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if(!email || !password) return;

  Swal.fire({ title: 'Connecting...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

  signInWithEmailAndPassword(auth, email, password)
    .then(() => { Swal.close(); })
    .catch((error) => {
      if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          createUserWithEmailAndPassword(auth, email, password)
            .then((res) => {
              sendEmailVerification(res.user);
              Swal.fire({ icon: 'success', title: 'Account Created', text: 'Verify link sent to your email! ✅' });
            })
            .catch(err => Swal.fire({ icon: 'error', title: 'Error', text: err.message }));
      } else {
          Swal.fire({ icon: 'error', title: 'Error', text: error.message });
      }
    });
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => { Swal.fire({ icon: 'info', title: 'Logged out', timer: 1500, showConfirmButton: false }); });
});
</script>
</body>
</html>
